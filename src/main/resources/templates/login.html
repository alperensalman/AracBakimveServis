<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Giriş — Araç Bakım & Servis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-body">
<div class="login-wrapper">
    <div class="login-brand">
        <div class="brand-icon">🔧</div>
        <h1 class="brand-title">Araç Bakım</h1>
        <p class="brand-sub">& Servis Yönetim Sistemi</p>
    </div>
    <div class="login-card">
        <h2 class="login-heading">Sisteme Giriş</h2>
        <p class="login-sub" th:if="${param.logout}">Başarıyla çıkış yapıldı.</p>
        <p class="login-error" th:if="${param.error}">Kullanıcı adı veya şifre hatalı.</p>
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Kullanıcı Adı</label>
                <input type="text" id="username" name="username" placeholder="admin veya personel" required>
            </div>
            <div class="form-group">
                <label for="password">Şifre</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Giriş Yap</button>
        </form>
        <div class="login-hint">
            <p><strong>Admin:</strong> admin / 12345 &nbsp;|&nbsp; <strong>Personel:</strong> personel / 12345</p>
        </div>
    </div>
</div>
</body>
</html>

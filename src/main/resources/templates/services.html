<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Servis Kayıtları — Araç Bakım & Servis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">🔧 Araç Bakım & Servis</div>
    <div class="nav-links">
        <a th:href="@{/ui/dashboard}" class="nav-link">Dashboard</a>
        <a th:href="@{/ui/vehicles}" class="nav-link">Araçlar</a>
        <a th:href="@{/ui/services}" class="nav-link active">Servis Kayıtları</a>
    </div>
    <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn-logout">Çıkış</button>
    </form>
</nav>

<main class="main-content">
    <div class="page-header">
        <h1 class="page-title">Servis Kayıtları</h1>
        <p class="page-sub">Araçlara servis kaydı ekle</p>
    </div>

    <div class="section-card" style="max-width:520px">
        <div class="section-header">
            <h2 class="section-title">Yeni Servis Kaydı</h2>
        </div>
        <form th:action="@{/ui/services/add}" th:object="${serviceDTO}" method="post">
            <div class="form-group">
                <label>Araç Seç</label>
                <select th:field="*{vehicleId}">
                    <option value="">Araç seçiniz</option>
                    <option th:each="v : ${vehicles}"
                            th:value="${v.id}"
                            th:text="${v.plate + ' — ' + v.brand + ' ' + v.model}">
                    </option>
                </select>
                <span class="field-error" th:if="${#fields.hasErrors('vehicleId')}" th:errors="*{vehicleId}"></span>
            </div>
            <div class="form-group">
                <label>Açıklama</label>
                <input type="text" th:field="*{description}" placeholder="Yağ değişimi, fren bakımı...">
                <span class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
            </div>
            <div class="form-group">
                <label>Maliyet (₺)</label>
                <input type="number" th:field="*{cost}" placeholder="850.00" step="0.01" min="0">
                <span class="field-error" th:if="${#fields.hasErrors('cost')}" th:errors="*{cost}"></span>
            </div>
            <button type="submit" class="btn-primary full-width">Servis Kaydı Ekle</button>
        </form>
    </div>
</main>
</body>
</html>
